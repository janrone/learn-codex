<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Codex 手机号验证排查清单</title>
  <desc id="desc">遇到 Codex 手机号验证失败时的排查清单，包括网络、浏览器、账号、短信和安全风险。</desc>
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="640" y="76" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="42" font-weight="700" fill="#0f172a">验证卡住时，按这张清单排查</text>
  <text x="640" y="116" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" fill="#475569">多数问题不是“必须绕过”，而是网络、浏览器状态或账号权限没有跑通。</text>
  <g font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18">
    <rect x="110" y="178" width="500" height="96" rx="22" fill="#f8fafc" stroke="#e2e8f0"/>
    <circle cx="158" cy="226" r="18" fill="#22c55e"/><path d="M148 226l7 7 14-16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="192" y="218" font-weight="700" fill="#111827">网络与地区</text>
    <text x="192" y="246" font-size="15" fill="#64748b">页面打不开、验证码不出现时，先换稳定网络或节点。</text>

    <rect x="670" y="178" width="500" height="96" rx="22" fill="#f8fafc" stroke="#e2e8f0"/>
    <circle cx="718" cy="226" r="18" fill="#22c55e"/><path d="M708 226l7 7 14-16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="752" y="218" font-weight="700" fill="#111827">浏览器状态</text>
    <text x="752" y="246" font-size="15" fill="#64748b">清理异常扩展，关闭拦截脚本，重新登录 ChatGPT。</text>

    <rect x="110" y="314" width="500" height="96" rx="22" fill="#f8fafc" stroke="#e2e8f0"/>
    <circle cx="158" cy="362" r="18" fill="#22c55e"/><path d="M148 362l7 7 14-16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="192" y="354" font-weight="700" fill="#111827">账号权限</text>
    <text x="192" y="382" font-size="15" fill="#64748b">确认账号能正常访问 ChatGPT，套餐和地区支持相关能力。</text>

    <rect x="670" y="314" width="500" height="96" rx="22" fill="#f8fafc" stroke="#e2e8f0"/>
    <circle cx="718" cy="362" r="18" fill="#22c55e"/><path d="M708 362l7 7 14-16" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="752" y="354" font-weight="700" fill="#111827">短信验证</text>
    <text x="752" y="382" font-size="15" fill="#64748b">检查号码格式、短信拦截、频率限制，必要时稍后再试。</text>

    <rect x="110" y="450" width="500" height="96" rx="22" fill="#fff7ed" stroke="#fed7aa"/>
    <circle cx="158" cy="498" r="18" fill="#f97316"/><text x="158" y="505" text-anchor="middle" font-size="24" font-weight="700" fill="#fff">!</text>
    <text x="192" y="490" font-weight="700" fill="#111827">不要用接码或代验证</text>
    <text x="192" y="518" font-size="15" fill="#64748b">这会增加账号被盗、风控、封禁和隐私泄露风险。</text>

    <rect x="670" y="450" width="500" height="96" rx="22" fill="#eef2ff" stroke="#c7d2fe"/>
    <circle cx="718" cy="498" r="18" fill="#6366f1"/><text x="718" y="505" text-anchor="middle" font-size="24" font-weight="700" fill="#fff">?</text>
    <text x="752" y="490" font-weight="700" fill="#111827">仍失败怎么办</text>
    <text x="752" y="518" font-size="15" fill="#64748b">换浏览器或设备复试，仍不行就联系官方支持。</text>
  </g>
</svg>
