<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Codex 登录验证排查流程</title>
  <desc id="desc">Codex 手机号验证问题的安全排查路径：官方入口、账号登录、验证、回到桌面应用。</desc>
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="640" y="76" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="42" font-weight="700" fill="#0f172a">Codex 手机号验证，先走官方流程</text>
  <text x="640" y="116" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" fill="#475569">不要先找“绕过方法”，先确认入口、账号、网络和浏览器授权是否正常。</text>
  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <rect x="70" y="220" width="245" height="180" rx="24" fill="#eef2ff" stroke="#6366f1"/>
    <circle cx="192" cy="276" r="30" fill="#6366f1"/>
    <text x="192" y="287" text-anchor="middle" font-size="28" font-weight="700" fill="#fff">1</text>
    <text x="192" y="334" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">打开官方入口</text>
    <text x="192" y="367" text-anchor="middle" font-size="15" fill="#475569">chatgpt.com/codex/cloud</text>
    <path d="M315 310h75" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
    <path d="M390 310l-16-11v22z" fill="#94a3b8"/>

    <rect x="410" y="220" width="245" height="180" rx="24" fill="#f0fdf4" stroke="#22c55e"/>
    <circle cx="532" cy="276" r="30" fill="#22c55e"/>
    <text x="532" y="287" text-anchor="middle" font-size="28" font-weight="700" fill="#fff">2</text>
    <text x="532" y="334" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">登录账号</text>
    <text x="532" y="367" text-anchor="middle" font-size="15" fill="#475569">使用 ChatGPT / OpenAI 账号</text>
    <path d="M655 310h75" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
    <path d="M730 310l-16-11v22z" fill="#94a3b8"/>

    <rect x="750" y="220" width="245" height="180" rx="24" fill="#fff7ed" stroke="#f97316"/>
    <circle cx="872" cy="276" r="30" fill="#f97316"/>
    <text x="872" y="287" text-anchor="middle" font-size="28" font-weight="700" fill="#fff">3</text>
    <text x="872" y="334" text-anchor="middle" font-size="25" font-weight="700" fill="#111827">完成验证</text>
    <text x="872" y="367" text-anchor="middle" font-size="15" fill="#475569">按页面提示完成手机号验证</text>
    <path d="M995 310h75" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
    <path d="M1070 310l-16-11v22z" fill="#94a3b8"/>

    <rect x="1090" y="220" width="120" height="180" rx="24" fill="#f8fafc" stroke="#cbd5e1"/>
    <circle cx="1150" cy="276" r="30" fill="#0f172a"/>
    <text x="1150" y="287" text-anchor="middle" font-size="28" font-weight="700" fill="#fff">4</text>
    <text x="1150" y="334" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">回到</text>
    <text x="1150" y="363" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">App</text>
  </g>
  <rect x="150" y="480" width="980" height="96" rx="24" fill="#0f172a"/>
  <text x="640" y="520" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700" fill="#fff">安全原则</text>
  <text x="640" y="554" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="17" fill="#cbd5e1">不使用接码平台、不交出账号密码、不安装来路不明插件、不相信代验证服务。</text>
</svg>
