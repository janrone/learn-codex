<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="812" viewBox="0 0 1240 812" role="img" aria-labelledby="title desc">
  <title id="title">Get started with Codex</title>
  <desc id="desc">Codex 桌面应用启动教程，包含登录、选择项目和开始第一个任务三步。</desc>
  <rect width="1240" height="812" fill="#fff"/>
  <circle cx="620" cy="66" r="24" fill="#5971f6"/>
  <text x="620" y="74" text-anchor="middle" font-family="Arial" font-size="26" font-weight="700" fill="#fff">›</text>
  <text x="620" y="207" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="58" fill="#050505">Get started with Codex</text>
  <text x="620" y="262" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#050505">如果下载没有自动开始，请点击下方。</text>
  <rect x="552" y="293" width="132" height="40" rx="20" fill="#050505"/>
  <text x="618" y="318" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#fff">下载 Windows 版</text>
  <g transform="translate(44 452)">
    <rect x="0" y="0" width="367" height="219" rx="10" fill="#5568f4"/>
    <rect x="36" y="17" width="298" height="184" rx="16" fill="#eef3ff" opacity=".92"/>
    <circle cx="184" cy="84" r="11" fill="none" stroke="#111827" stroke-width="2"/>
    <path d="M175 84c7-15 18-15 18 0" fill="none" stroke="#111827" stroke-width="2" stroke-linecap="round"/>
    <text x="184" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Welcome to Codex</text>
    <rect x="126" y="148" width="116" height="24" rx="12" fill="#050505"/>
    <text x="184" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#fff">Continue with ChatGPT</text>
    <rect x="126" y="181" width="116" height="23" rx="12" fill="#f8fbff" stroke="#dbe5ff"/>
    <text x="184" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#111827">Enter API key</text>
    <text x="184" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#050505">1</text>
    <text x="184" y="324" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#050505">打开 Codex，使用你的 ChatGPT 帐户登录</text>
  </g>
  <g transform="translate(434 452)">
    <rect x="0" y="0" width="367" height="219" rx="10" fill="#5568f4"/>
    <rect x="36" y="17" width="298" height="184" rx="16" fill="#eef3ff" opacity=".92"/>
    <text x="184" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">Select your project</text>
    <rect x="92" y="86" width="11" height="11" rx="2" fill="#111827"/>
    <text x="98" y="96" text-anchor="middle" font-family="Arial" font-size="11" fill="#fff">✓</text>
    <text x="116" y="96" font-family="Arial, sans-serif" font-size="9" fill="#111827">Weather app</text>
    <text x="240" y="96" font-family="Arial, sans-serif" font-size="8" fill="#9ca3af">gdb/weather-app</text>
    <rect x="92" y="110" width="11" height="11" rx="2" fill="#fff" stroke="#dbe5ff"/>
    <text x="116" y="120" font-family="Arial, sans-serif" font-size="9" fill="#111827">monorepo</text>
    <text x="240" y="120" font-family="Arial, sans-serif" font-size="8" fill="#9ca3af">gdb/open-ai/monorepo</text>
    <rect x="92" y="134" width="11" height="11" rx="2" fill="#fff" stroke="#dbe5ff"/>
    <text x="116" y="144" font-family="Arial, sans-serif" font-size="9" fill="#111827">experiments</text>
    <text x="240" y="144" font-family="Arial, sans-serif" font-size="8" fill="#9ca3af">gdb/experiments</text>
    <rect x="80" y="171" width="98" height="24" rx="12" fill="#f8fbff" stroke="#dbe5ff"/>
    <text x="129" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#111827">Add project</text>
    <rect x="188" y="171" width="98" height="24" rx="12" fill="#050505"/>
    <text x="237" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#fff">Continue</text>
    <text x="184" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#050505">2</text>
    <text x="184" y="310" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#050505">选择你电脑上的一个文件夹或 Git 代码仓库，</text>
    <text x="184" y="332" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#050505">Codex 将在其中工作</text>
  </g>
  <g transform="translate(824 452)">
    <rect x="0" y="0" width="367" height="219" rx="10" fill="#5568f4"/>
    <rect x="36" y="17" width="298" height="184" rx="16" fill="#eef3ff" opacity=".92"/>
    <circle cx="184" cy="66" r="11" fill="none" stroke="#111827" stroke-width="2"/>
    <path d="M175 66c7-15 18-15 18 0" fill="none" stroke="#111827" stroke-width="2" stroke-linecap="round"/>
    <text x="184" y="103" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#111827">Let's build</text>
    <text x="184" y="123" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6b7280">New project⌄</text>
    <rect x="60" y="143" width="247" height="60" rx="14" fill="#fff"/>
    <text x="77" y="176" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af">Tell codex what to do</text>
    <circle cx="291" cy="183" r="11" fill="#050505"/>
    <text x="291" y="188" text-anchor="middle" font-family="Arial" font-size="14" fill="#fff">↑</text>
    <text x="184" y="273" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#050505">3</text>
    <text x="184" y="324" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#050505">开始你的第一个任务</text>
  </g>
</svg>
