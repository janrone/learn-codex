<svg xmlns="http://www.w3.org/2000/svg" width="1535" height="768" viewBox="0 0 1535 768" role="img" aria-labelledby="title desc">
  <title id="title">选择如何开始使用 Codex</title>
  <desc id="desc">Codex 开始方式选择界面，包含安装 CLI、下载应用和试用 IDE 扩展程序三个入口。</desc>
  <rect width="1535" height="768" fill="#ffffff"/>
  <text x="768" y="66" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="40" font-weight="700" fill="#050505">选择如何开始使用 Codex</text>
  <text x="768" y="104" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#233e75">Codex 内置于 IDE、CLI、GitHub 和网页端。你可以选择在本地协同工作，或在你离开后让它在云端持续运行。</text>
  <g transform="translate(42 165)">
    <rect x="0" y="0" width="416" height="520" rx="16" fill="#fff" stroke="#e5e7eb"/>
    <rect x="22" y="22" width="372" height="305" rx="22" fill="#2563eb"/>
    <rect x="68" y="60" width="326" height="267" rx="16" fill="#e8eefc" opacity=".9"/>
    <circle cx="96" cy="77" r="4" fill="#fff"/><circle cx="108" cy="77" r="4" fill="#fff"/><circle cx="120" cy="77" r="4" fill="#fff"/>
    <rect x="80" y="112" width="290" height="67" rx="3" fill="#f7f9ff" stroke="#c9d5ef"/>
    <text x="107" y="144" font-family="Consolas, monospace" font-size="14" font-weight="700" fill="#111827">OpenAI Codex</text>
    <text x="108" y="171" font-family="Consolas, monospace" font-size="12" fill="#6b7280">model: gpt-5.2-codex medium</text>
    <rect x="80" y="224" width="300" height="58" rx="3" fill="#f7f9ff" stroke="#c9d5ef"/>
    <text x="92" y="256" font-family="Consolas, monospace" font-size="15" fill="#111827">Hey Codex, implement dark mode</text>
    <text x="208" y="376" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#050505">安装 CLI</text>
    <rect x="22" y="455" width="372" height="42" rx="21" fill="#050505"/>
    <text x="208" y="481" text-anchor="middle" font-family="Consolas, monospace" font-size="13" font-weight="700" fill="#fff">$ npm i -g @openai/codex</text>
  </g>
  <g transform="translate(475 165)">
    <rect x="0" y="0" width="416" height="520" rx="16" fill="#fff" stroke="#6366f1" stroke-width="1.5"/>
    <rect x="22" y="22" width="372" height="305" rx="22" fill="#6559f5"/>
    <rect x="66" y="86" width="284" height="240" rx="12" fill="#f4edff"/>
    <circle cx="80" cy="100" r="4" fill="#fff"/><circle cx="92" cy="100" r="4" fill="#fff"/><circle cx="104" cy="100" r="4" fill="#fff"/>
    <circle cx="208" cy="135" r="13" fill="none" stroke="#111827" stroke-width="2"/>
    <path d="M198 135c8-18 20-18 20 0" fill="none" stroke="#111827" stroke-width="2" stroke-linecap="round"/>
    <text x="208" y="176" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="17" font-weight="700" fill="#111827">Let's build</text>
    <rect x="80" y="221" width="256" height="67" rx="16" fill="#fff"/>
    <text x="102" y="257" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af">Add exponential backoff to the API</text>
    <circle cx="326" cy="269" r="12" fill="#111827"/><text x="326" y="274" text-anchor="middle" font-family="Arial" font-size="15" fill="#fff">↑</text>
    <text x="208" y="376" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#050505">下载应用</text>
    <rect x="22" y="400" width="372" height="42" rx="21" fill="#5b5cf1"/>
    <text x="208" y="426" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#fff">在你的 IDE 中尝试⌄</text>
    <rect x="22" y="455" width="372" height="42" rx="21" fill="#fff" stroke="#e5e7eb"/>
    <text x="208" y="481" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#111827">加入 Codex 应用候补名单</text>
  </g>
  <g transform="translate(908 165)">
    <rect x="0" y="0" width="416" height="520" rx="16" fill="#fff" stroke="#e5e7eb"/>
    <rect x="22" y="22" width="372" height="305" rx="22" fill="#4f65ef"/>
    <rect x="38" y="22" width="308" height="267" rx="16" fill="#edf1ff" opacity=".93"/>
    <text x="60" y="60" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">I implemented the slider including ARIA labels, focus</text>
    <text x="60" y="78" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">rings, step snapping, and haptic feedback on mobile.</text>
    <rect x="60" y="102" width="288" height="82" rx="7" fill="#fff" opacity=".75"/>
    <text x="78" y="129" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">2 files edited</text>
    <text x="154" y="129" font-family="Arial, sans-serif" font-size="13" fill="#16a34a" font-weight="700">+123</text>
    <text x="194" y="129" font-family="Arial, sans-serif" font-size="13" fill="#ef4444" font-weight="700">-42</text>
    <rect x="60" y="207" width="288" height="70" rx="10" fill="#fff"/>
    <text x="77" y="238" font-family="Arial, sans-serif" font-size="12" fill="#111827">Looks great, add tests!</text>
    <circle cx="328" cy="254" r="12" fill="#111827"/><text x="328" y="259" text-anchor="middle" font-family="Arial" font-size="15" fill="#fff">↑</text>
    <text x="208" y="376" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="30" font-weight="700" fill="#050505">试用 IDE 扩展程序</text>
    <rect x="22" y="455" width="372" height="42" rx="21" fill="#050505"/>
    <text x="208" y="481" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#fff">在你的 IDE 中尝试⌄</text>
  </g>
</svg>
