name: Sync fork

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/ismoshushi/learn-codex.git
          git fetch upstream main

      - name: Sync main
        run: |
          git checkout main
          git merge upstream/main --no-edit
          git push origin main
